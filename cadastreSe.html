<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastre-se</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="brand">
        <img class="brand__logo" src="imagens/logo.png" alt="Logo Café Starbuzz">
        <div>
          <h1 class="brand__title">Café Starbuzz <sup>&reg;</sup></h1>
          <p class="brand__subtitle">Receba novidades por e-mail</p>
        </div>
      </div>
      <nav aria-label="Principal">
        <ul class="menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="producao.html">Produção</a></li>
          <li><a href="capuccino.html">Receitas</a></li>
          <li><a class="active" href="cadastreSe.html">Cadastre-se</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="hero__panel" style="margin-bottom:24px;">
        <div>
          <span class="badge">Cadastro</span>
          <h2 class="section-title" style="margin-top:12px;">Cadastre-se no Café Starbuzz</h2>
          <p>Preencha o formulário para receber novidades, promoções e conteúdos especiais.</p>
        </div>
        <img class="hero__image" src="imagens/logo.png" alt="Logo Café Starbuzz">
      </div>

      <div class="card form-card">
        <form action="#" method="get">
          <div class="field-grid">
            <div class="field">
              <label for="nomecompleto">Nome completo *</label>
              <input type="text" id="nomecompleto" name="nomecompleto" minlength="3" maxlength="150" placeholder="Digite seu nome completo" required>
            </div>
            <div class="field">
              <label for="datanascimento">Data de nascimento *</label>
              <input type="date" id="datanascimento" name="datanascimento" required>
            </div>
          </div>

          <div class="field">
            <label for="email">E-mail *</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
          </div>

          <fieldset>
            <legend>Sexo *</legend>
            <div class="inline-options">
              <label><input type="radio" name="sexo" value="Feminino" required> Feminino</label>
              <label><input type="radio" name="sexo" value="Masculino"> Masculino</label>
              <label><input type="radio" name="sexo" value="Outro"> Outro</label>
            </div>
          </fieldset>

          <div class="field-grid">
            <div class="field">
              <label for="cafePreferido">Seu café preferido</label>
              <select id="cafePreferido" name="cafePreferido">
                <option value="misturaDaCasa">Mistura da Casa</option>
                <option value="cafeArabico">Café Arábica</option>
                <option value="capuccino">Cappuccino</option>
                <option value="cha">Chá</option>
              </select>
            </div>
            <div class="field">
              <label>Você toma café...</label>
              <div class="inline-options" style="padding-top:4px;">
                <label><input type="checkbox" name="voceTomaCafe[]" value="manha"> Manhã</label>
                <label><input type="checkbox" name="voceTomaCafe[]" value="tarde"> Tarde</label>
                <label><input type="checkbox" name="voceTomaCafe[]" value="noite"> Noite</label>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="comentario">Comentário</label>
            <textarea id="comentario" name="comentario" placeholder="Deixe seu comentário..."></textarea>
          </div>

          <fieldset>
            <legend>Receber novidades por e-mail</legend>
            <label><input type="checkbox" name="novidades" value="receberNovidades"> Quero receber novidades</label>
          </fieldset>

          <div class="actions">
            <input class="btn-primary" type="submit" name="enviar" value="Enviar">
            <input class="btn-secondary" type="reset" name="limpar" value="Limpar">
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
